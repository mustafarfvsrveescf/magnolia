<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنوليا</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    background: #fff0f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: "Tajawal", sans-serif;
    overflow-x: hidden;
    position: relative;
  }
  .bg-flowers { position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0; }
  .petal {
    position:absolute;
    font-size:var(--s);
    animation: fall var(--d) linear var(--delay) infinite;
    opacity:0;
    top:-80px;
    left:var(--x);
  }
  @keyframes fall {
    0%   { opacity:0; transform:translateY(0) rotate(0deg); }
    10%  { opacity:0.85; }
    90%  { opacity:0.7; }
    100% { opacity:0; transform:translateY(110vh) rotate(400deg); }
  }
  body::before {
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(255,182,200,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 75%, rgba(255,150,180,0.3) 0%, transparent 50%),
      linear-gradient(160deg, #fff0f5 0%, #ffe4ee 50%, #fff5f8 100%);
    z-index:0; pointer-events:none;
  }
  .container {
    width:100%; max-width:400px;
    display:flex; flex-direction:column; align-items:center;
    position:relative; z-index:1;
  }
  .logo-wrap {
    width:155px; height:155px;
    border-radius:50%; overflow:hidden;
    border:3px solid rgba(200,169,110,0.5);
    box-shadow: 0 0 0 6px rgba(255,255,255,0.7), 0 12px 40px rgba(200,100,130,0.25);
    margin-bottom:18px;
    animation: popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
    opacity:0; background:white;
  }
  .logo-wrap img { width:100%; height:100%; object-fit:cover; }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.5); }
    to   { opacity:1; transform:scale(1); }
  }
  .subtitle {
    font-size:11px; letter-spacing:5px; color:#b07090;
    font-weight:300; text-transform:uppercase;
    margin-bottom:22px;
    animation: fadeUp 0.6s 0.3s ease forwards; opacity:0;
  }
  .divider {
    display:flex; align-items:center; gap:8px;
    margin-bottom:22px;
    animation: fadeUp 0.6s 0.35s ease forwards; opacity:0;
  }
  .divider-line { width:50px; height:1px; background:linear-gradient(to right, transparent, #C8A96E, transparent); }
  .divider-diamond { width:5px; height:5px; background:#C8A96E; transform:rotate(45deg); }
  .links { width:100%; display:flex; flex-direction:column; gap:10px; }
  .link-btn {
    display:flex; align-items:center; gap:14px;
    padding:14px 20px;
    background:rgba(255,255,255,0.78);
    backdrop-filter:blur(12px);
    border:1px solid rgba(200,169,110,0.25);
    border-radius:16px;
    text-decoration:none; color:#3a1a2a;
    transition:all 0.3s;
    animation:fadeUp 0.5s ease forwards; opacity:0;
    box-shadow:0 4px 16px rgba(200,100,130,0.08);
  }
  .link-btn:hover {
    border-color:rgba(200,169,110,0.6);
    transform:translateY(-3px);
    background:rgba(255,255,255,0.97);
    box-shadow:0 10px 28px rgba(200,100,130,0.18);
  }
  .link-btn:nth-child(1){animation-delay:0.4s}
  .link-btn:nth-child(2){animation-delay:0.5s}
  .link-btn:nth-child(3){animation-delay:0.6s}
  .link-btn:nth-child(4){animation-delay:0.7s}
  .link-btn:nth-child(5){animation-delay:0.8s}
  .link-icon {
    width:40px; height:40px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    min-width:40px; flex-shrink:0;
  }
  .link-icon svg { width:22px; height:22px; }
  .icon-insta {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  }
  .icon-fb { background: #1877F2; }
  .icon-wa { background: #25D366; }
  .icon-call { background: #C8A96E; }
  .icon-map { background: #EA4335; }
  .link-text { flex:1; }
  .link-title { font-size:15px; font-weight:600; color:#2a0f1e; display:block; }
  .link-sub { font-size:11px; color:#a07080; font-weight:300; margin-top:2px; display:block; }
  .link-arrow { color:#C8A96E; font-size:18px; opacity:0.6; transition:opacity 0.3s,transform 0.3s; }
  .link-btn:hover .link-arrow { opacity:1; transform:translateX(-3px); }
  .footer {
    margin-top:32px; font-size:20px; letter-spacing:6px;
    animation:fadeUp 0.5s 1s ease forwards; opacity:0;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
